name: Deploy

on:
  workflow_dispatch:

# Only one deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Deploy notebooks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks workspace import-dir notebooks /Prod/notebooks --overwrite

  terraform-apply:
    runs-on: ubuntu-latest
    # Requires a manual approval gate — configure the "production" environment
    # in repo Settings → Environments with yourself as a required reviewer.
    environment: production
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_sql_password: ${{ secrets.SQL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan
